<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartTask - Add Task</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    background:url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1600") no-repeat center center/cover;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.task-card{
    width:700px;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header i{
    font-size:55px;
    color:#ffd43b;
    margin-bottom:10px;
}

.header h2{
    font-weight:bold;
}

.header p{

    color:#f8f9fa;

}

.form-label{
    font-weight:bold;
}

.form-control,
.form-select{
    border-radius:12px;
    padding:12px;
    border:none;
}

textarea{
    resize:none;
}

.btn-save{
    background:#198754;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
}

.btn-save:hover{
    background:#157347;
}

.btn-back{
    padding:12px 30px;
    border-radius:10px;
    font-size:18px;
}

</style>
</head>
<body>
<div class="task-card">
<div class="header">
<i class="fas fa-calendar-plus"></i>
<h2>Add New Task</h2>
<p>Create your task and schedule reminders easily.</p>
</div>

<form id="taskForm">
<div class="mb-3">
<label class="form-label">
<i class="fas fa-file-alt"></i>
Task Title
</label>

<input type="text" id="title"
class="form-control"
placeholder="Enter Task Title">
</div>

<div class="mb-3">
<label class="form-label">
<i class="fas fa-align-left"></i>
Description
</label>

<textarea id="description"
class="form-control"
rows="4"
placeholder="Enter Task Description"></textarea>

</div>
<div class="mb-3">
<label class="form-label">
<i class="fas fa-calendar-days"></i>
Due Date & Time
</label>

<input type="datetime-local" id="dueDate"
class="form-control">
</div>

<div class="mb-3">
<label class="form-label">
<i class="fas fa-paperclip"></i>
Attach File (optional)
</label>
<input type="file" id="taskFile" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">
<i class="fas fa-bell"></i>

Reminder Type

</label>
<select id="reminderType" class="form-select">
<option>Email</option>
<option>SMS</option>
<option>Email & SMS</option>
</select>
</div>

<div class="text-center mt-4">
<button class="btn btn-save">
<i class="fas fa-save"></i>
Save Task
</button>

<a href="dashboard.html"
class="btn btn-secondary btn-back">
<i class="fas fa-arrow-left"></i>
Back
</a>
</div>

</form>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

document.getElementById('taskForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  let fileUrl = null;
  const fileInput = document.getElementById('taskFile');

  if (fileInput.files.length > 0) {
    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    const uploadRes = await fetch('/api/upload', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
      body: formData
    });
    const uploadData = await uploadRes.json();
    fileUrl = uploadData.url;
  }

  const body = {
    title: document.getElementById('title').value,
    description: document.getElementById('description').value,
    dueDate: document.getElementById('dueDate').value,
    reminderType: document.getElementById('reminderType').value,
    fileUrl: fileUrl
  };

  const res = await fetch('/api/tasks', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify(body)
  });

  if (res.ok) {
    window.location.href = 'dashboard.html';
  } else {
    alert('Failed to save task');
  }
});
</script>

</body>
</html>
