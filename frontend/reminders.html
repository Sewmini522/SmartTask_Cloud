<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartTask - Reminders</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#f4f7fc;}
.sidebar{position:fixed;width:250px;height:100%;background:#0d6efd;padding-top:20px;}
.sidebar h2{color:white;text-align:center;margin-bottom:30px;}
.sidebar a{display:block;color:white;padding:15px 25px;text-decoration:none;}
.sidebar a:hover{background:white;color:#0d6efd;}
.content{margin-left:250px;padding:30px;}
.header-box{background:linear-gradient(135deg,#0d6efd,#4f9cff);color:white;padding:30px;border-radius:20px;margin-bottom:25px;}
.reminder-card{background:white;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);padding:20px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;}
.reminder-card.overdue{border-left:6px solid #dc3545;}
.reminder-card.dueSoon{border-left:6px solid #ffc107;}
.reminder-card.upcoming{border-left:6px solid #0d6efd;}
.badge-overdue{background:#dc3545;}
.badge-dueSoon{background:#ffc107;color:#000;}
.badge-upcoming{background:#0d6efd;}
.empty-state{text-align:center;padding:60px;color:#888;}
</style>
</head>
<body>
<div class="sidebar">
<h2><i class="fas fa-tasks"></i> SmartTask</h2>
<a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
<a href="addtask.html"><i class="fas fa-plus-circle"></i> Add Task</a>
<a href="reminders.html"><i class="fas fa-bell"></i> Reminders</a>
<a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
<div class="content">
<div class="header-box">
<h2><i class="fas fa-bell"></i> Reminders</h2>
<p>Tasks that are overdue, due soon, or coming up.</p>
</div>
<div id="reminderList"></div>
</div>
<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

async function loadReminders() {
  const res = await fetch('/api/tasks', { headers: { Authorization: `Bearer ${token}` } });
  const tasks = await res.json();
  const pending = tasks.filter(t => t.Status === 'Pending');
  const now = new Date();
  const list = document.getElementById('reminderList');

  if (pending.length === 0) {
    list.innerHTML = `<div class="empty-state"><h4>No pending reminders</h4><p>You're all caught up.</p></div>`;
    return;
  }

  const withStatus = pending.map(t => {
    const due = new Date(t.DueDate);
    const hoursLeft = (due - now) / (1000 * 60 * 60);
    let statusClass, badgeClass, badgeText;
    if (hoursLeft < 0) { statusClass='overdue'; badgeClass='badge-overdue'; badgeText='Overdue'; }
    else if (hoursLeft <= 24) { statusClass='dueSoon'; badgeClass='badge-dueSoon'; badgeText='Due Soon'; }
    else { statusClass='upcoming'; badgeClass='badge-upcoming'; badgeText='Upcoming'; }
    return { ...t, statusClass, badgeClass, badgeText, due };
  });

  withStatus.sort((a,b) => a.due - b.due);

  list.innerHTML = withStatus.map(t => `
    <div class="reminder-card ${t.statusClass}">
      <div>
        <h5>${t.Title}</h5>
        <p class="mb-0 text-muted">${t.Description ?? ''}</p>
        <small>Due: ${t.due.toLocaleString()}</small>
      </div>
      <span class="badge ${t.badgeClass}">${t.badgeText}</span>
    </div>
  `).join('');
}
loadReminders();
</script>
</body>
</html>
