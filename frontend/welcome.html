<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartTask</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    background:url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1600") no-repeat center center/cover;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.overlay{

    width:100%;
    height:100vh;

    background:rgba(0,0,0,0.45);

    display:flex;

    justify-content:center;

    align-items:center;

}

.welcome-card{

    width:600px;

    padding:50px;

    border-radius:25px;

    text-align:center;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(15px);

    color:white;

    box-shadow:0 8px 30px rgba(0,0,0,0.4);

}

.logo{

    font-size:70px;

    color:#FFD43B;

    margin-bottom:20px;

}

h1{

    font-weight:bold;

    margin-bottom:15px;

}

p{

    font-size:18px;

    margin-bottom:35px;

}

.btn-login{

    background:#0d6efd;

    color:white;

    width:180px;

    border:none;

    border-radius:10px;

    padding:12px;

    font-size:18px;

    margin-right:15px;

}

.btn-login:hover{

    background:#0b5ed7;

}

.btn-register{

    background:#198754;

    color:white;

    width:180px;

    border:none;

    border-radius:10px;

    padding:12px;

    font-size:18px;

}

.btn-register:hover{

    background:#157347;

}

.footer{

    margin-top:30px;

    font-size:15px;

    color:#f8f9fa;

}

</style>

</head>

<body>

<div class="overlay">

<div class="welcome-card">

<div class="logo">

<i class="fas fa-tasks"></i>

</div>

<h1>Welcome to SmartTask</h1>

<p>
Manage your daily tasks, assignments, meetings, and reminders in one place.
Stay organized and never miss an important deadline.
</p>

<a href="login.html" class="btn btn-login">

<i class="fas fa-sign-in-alt"></i>

Login

</a>

<a href="register.html" class="btn btn-register">

<i class="fas fa-user-plus"></i>

Register

</a>

<div class="footer">

Cloud-Based Task Manager with Automated Reminders

</div>

</div>

</div>

</body>
</html>
