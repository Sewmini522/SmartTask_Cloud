<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartTask - Edit Task</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    background:url("https://images.unsplash.com/photo-1497366754035-f200968a6e72?w=1600") no-repeat center center/cover;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.task-card{

    width:700px;

    background:rgba(255,255,255,0.18);

    backdrop-filter:blur(15px);

    border-radius:20px;

    padding:35px;

    color:white;

    box-shadow:0 8px 32px rgba(0,0,0,0.35);

}

.header{

    text-align:center;

    margin-bottom:30px;

}

.header i{

    font-size:55px;

    color:#ffd43b;

    margin-bottom:10px;

}

.header h2{

    font-weight:bold;

}

.header p{

    color:#f8f9fa;

}

.form-label{

    font-weight:bold;

}

.form-control,
.form-select{

    border-radius:12px;

    padding:12px;

    border:none;

}

textarea{

    resize:none;

}

.btn-update{

    background:#0d6efd;

    color:white;

    border:none;

    padding:12px 30px;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

}

.btn-update:hover{

    background:#0b5ed7;

}

.btn-back{

    padding:12px 30px;

    border-radius:10px;

    font-size:18px;

}

</style>

</head>

<body>

<div class="task-card">

<div class="header">

<i class="fas fa-pen-to-square"></i>

<h2>Edit Task</h2>

<p>Update your task details quickly and easily.</p>

</div>

<form id="editForm">

<div class="mb-3">

<label class="form-label">

<i class="fas fa-file-alt"></i>

Task Title

</label>

<input type="text" id="title" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">

<i class="fas fa-align-left"></i>

Description

</label>

<textarea id="description" class="form-control" rows="4"></textarea>

</div>

<div class="mb-3">

<label class="form-label">

<i class="fas fa-calendar-days"></i>

Due Date & Time

</label>

<input type="datetime-local" id="dueDate" class="form-control">

</div>

<div class="mb-3">

<label class="form-label">

<i class="fas fa-check-circle"></i>

Task Status

</label>

<select id="status" class="form-select">
<option>Pending</option>
<option>Completed</option>
</select>

</div>

<div class="text-center mt-4">

<button class="btn btn-update">

<i class="fas fa-pen"></i>

Update Task

</button>

<a href="dashboard.html"
class="btn btn-secondary btn-back">

<i class="fas fa-arrow-left"></i>

Back

</a>

</div>

</form>

</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

const params = new URLSearchParams(window.location.search);
const taskId = params.get('id');

async function loadTask() {
  const res = await fetch('/api/tasks', { headers: { Authorization: `Bearer ${token}` } });
  const tasks = await res.json();
  const task = tasks.find(t => t.TaskId == taskId);

  if (!task) {
    alert('Task not found');
    window.location.href = 'dashboard.html';
    return;
  }

  document.getElementById('title').value = task.Title;
  document.getElementById('description').value = task.Description ?? '';
  document.getElementById('status').value = task.Status;

  if (task.DueDate) {
    const d = new Date(task.DueDate);
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    document.getElementById('dueDate').value = d.toISOString().slice(0,16);
  }
}

document.getElementById('editForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const body = {
    title: document.getElementById('title').value,
    description: document.getElementById('description').value,
    dueDate: document.getElementById('dueDate').value,
    status: document.getElementById('status').value
  };

  const res = await fetch(`/api/tasks/${taskId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify(body)
  });

  if (res.ok) {
    window.location.href = 'dashboard.html';
  } else {
    alert('Failed to update task');
  }
});

loadTask();
</script>

</body>
</html>
